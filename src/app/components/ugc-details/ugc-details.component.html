<ng-content></ng-content>
<ng-container *ngIf="track != null">

    <ion-header>
      <ion-toolbar class="webmapp-track-details-toolbar">
        <span
          *ngIf="track"
          [innerHtml]="track.title | wmtrans"
          class="wm-track-details-header"
        ></span>
        <ion-buttons slot="end">
          <ion-button class="webmapp-track-details-dismiss" (click)="triggerDismiss()">
            <ion-icon name="close"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>
    <div #content id="webmapp-track-details-content">
      <div class="webmapp-track-title" *ngIf="track.title as title">
        {{title | wmtrans}}
      </div>

      <wm-form [confPOIFORMS]="confTRACKFORMS$|async" [init]="track" [disabled]="!(isEditing$|async)"></wm-form>

      <!-- <wm-slope-chart
        *ngIf="track != null"
        [currentTrack]="track"
        (hover)="onLocationHover($event)"
        id="webmapp-track-details-elevation-chart"
      >
      </wm-slope-chart> -->

      <!-- <div class="wm-track-details-download" *ngIf="confOPTIONS$|async as confOPTIONS">
        <ng-container *ngIf="confOPTIONS.download_track_enable === true">
          <div class="webmapp-title">{{'Downloads'|wmtrans}}</div>
          <wm-track-download-urls
            class="wm-track-details-download-urls"
            [properties]="track.properties"
            id="webmapp-track-details-download-urls"
          >
            <ng-content></ng-content>
          </wm-track-download-urls>
        </ng-container>
      </div> -->

      <ng-container *ngIf="enableEditingInline$|async">
        <ion-button
          *ngIf="!(isEditing$|async); else editingButtons"
          class="wm-track-details-edit-geohub"
          (click)="this.isEditing$.next(true)"
        >{{'edit'|wmtrans}}</ion-button>
        <ng-template #editingButtons>
          <ion-button
            class="wm-track-details-edit-geohub"
            *ngIf="enableEditingInline$|async"
            (click)="save()"
          >{{'save'|wmtrans}}</ion-button>
          <ion-button
            class="wm-track-details-edit-geohub"
            *ngIf="enableEditingInline$|async"
            (click)="this.isEditing$.next(false)"
          >{{'cancel'|wmtrans}}</ion-button>
        </ng-template>
      </ng-container>
    </div>
</ng-container>
